version: 2

project_name: bu1ld-go-plugin
dist: ../../dist/bu1ld-go-plugin

before:
  hooks:
    - go mod download

builds:
  - id: bu1ld-go-plugin
    main: ./cmd/bu1ld-go-plugin
    binary: bu1ld-go-plugin
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    targets:
      - linux_amd64_v1
      - linux_arm64
      - darwin_amd64_v1
      - darwin_arm64
      - windows_amd64_v1
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: plugin
    ids:
      - bu1ld-go-plugin
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - plugin.toml

nfpms:
  - id: linux-packages
    package_name: bu1ld-go-plugin
    file_name_template: "{{ .ConventionalFileName }}"
    ids:
      - bu1ld-go-plugin
    vendor: bu1ld
    homepage: https://github.com/DaiYuANg/bu1ld
    maintainer: DaiYuANg
    description: |-
      First-party external Go plugin for bu1ld.
    section: devel
    priority: optional
    bindir: /usr/bin
    contents:
      - src: plugin.toml
        dst: /usr/share/bu1ld/plugins/org.bu1ld.go/plugin.toml
    formats:
      - deb
      - rpm

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
