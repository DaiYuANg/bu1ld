name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Test Go
        run: go test ./...

      - name: Test Go plugin
        run: go test ./plugins/go/...

      - name: Check Java plugin
        run: ./plugins/java/gradlew -p plugins/java check

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  java-plugin-assets:
    needs: goreleaser
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            plugin_os: linux
            plugin_arch: amd64
            extension: tar.gz
          - runner: macos-15-intel
            plugin_os: darwin
            plugin_arch: amd64
            extension: tar.gz
          - runner: macos-15
            plugin_os: darwin
            plugin_arch: arm64
            extension: tar.gz
          - runner: windows-latest
            plugin_os: windows
            plugin_arch: amd64
            extension: zip
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Build Java plugin
        if: runner.os != 'Windows'
        run: ./plugins/java/gradlew -p plugins/java assemble

      - name: Build Java plugin
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\plugins\java\gradlew.bat -p plugins/java assemble

      - name: Upload Java plugin asset
        if: runner.os != 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          asset="bu1ld-java-plugin_${version}_${{ matrix.plugin_os }}_${{ matrix.plugin_arch }}.${{ matrix.extension }}"
          stage="dist/java-plugin-package"
          rm -rf "$stage"
          mkdir -p "$stage"
          cp -R plugins/java/build/plugin/. "$stage/"
          tar -czf "$asset" -C "$stage" .
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$asset" > "$asset.sha256"
          else
            shasum -a 256 "$asset" | awk '{print $1 "  " $2}' > "$asset.sha256"
          fi
          gh release upload "$GITHUB_REF_NAME" "$asset" "$asset.sha256" --clobber

      - name: Upload Java plugin asset
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          $asset = "bu1ld-java-plugin_${version}_${{ matrix.plugin_os }}_${{ matrix.plugin_arch }}.${{ matrix.extension }}"
          $stage = "dist\java-plugin-package"
          if (Test-Path $stage) {
            Remove-Item -Recurse -Force $stage
          }
          New-Item -ItemType Directory -Force $stage | Out-Null
          Copy-Item -Path "plugins\java\build\plugin\*" -Destination $stage -Recurse -Force
          Compress-Archive -Path "$stage\*" -DestinationPath $asset -Force
          $hash = (Get-FileHash $asset -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $asset" | Set-Content "$asset.sha256"
          gh release upload $env:GITHUB_REF_NAME $asset "$asset.sha256" --clobber

  verify-release-assets:
    needs:
      - goreleaser
      - java-plugin-assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist/release
          gh release download "$GITHUB_REF_NAME" --dir dist/release --clobber

      - name: Verify release checksums
        run: bash scripts/verify-release-assets.sh dist/release
