name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: plugins/typescript/package-lock.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Go
        run: go test ./...

      - name: Test Go plugin
        run: go test ./plugins/go/...

      - name: Check Java plugin
        run: ./plugins/java/gradlew -p plugins/java check

      - name: Check TypeScript plugin
        run: |
          npm --prefix plugins/typescript ci
          npm --prefix plugins/typescript test

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute container metadata
        id: container
        shell: bash
        run: |
          echo "namespace=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata for bu1ld image
        id: meta-bu1ld
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.container.outputs.namespace }}/bu1ld
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Publish bu1ld image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packaging/container/bu1ld.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-bu1ld.outputs.tags }}
          labels: ${{ steps.meta-bu1ld.outputs.labels }}
          build-args: |
            VERSION=${{ steps.container.outputs.version }}
            COMMIT=${{ github.sha }}

      - name: Metadata for Go plugin image
        id: meta-go-plugin
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.container.outputs.namespace }}/bu1ld-go-plugin
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Publish Go plugin image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packaging/container/bu1ld-go-plugin.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-go-plugin.outputs.tags }}
          labels: ${{ steps.meta-go-plugin.outputs.labels }}
          build-args: |
            VERSION=${{ steps.container.outputs.version }}
            COMMIT=${{ github.sha }}

  java-plugin-container:
    needs: goreleaser
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute container metadata
        id: container
        shell: bash
        run: |
          echo "namespace=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata for Java plugin image
        id: meta-java-plugin
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.container.outputs.namespace }}/bu1ld-java-plugin
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Publish Java plugin image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packaging/container/bu1ld-java-plugin.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-java-plugin.outputs.tags }}
          labels: ${{ steps.meta-java-plugin.outputs.labels }}

  typescript-plugin-container:
    needs: goreleaser
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute container metadata
        id: container
        shell: bash
        run: |
          echo "namespace=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata for TypeScript plugin image
        id: meta-typescript-plugin
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.container.outputs.namespace }}/bu1ld-typescript-plugin
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Publish TypeScript plugin image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packaging/container/bu1ld-typescript-plugin.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-typescript-plugin.outputs.tags }}
          labels: ${{ steps.meta-typescript-plugin.outputs.labels }}

  java-plugin-assets:
    needs: goreleaser
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            plugin_os: linux
            plugin_arch: amd64
            extension: tar.gz
          - runner: macos-15-intel
            plugin_os: darwin
            plugin_arch: amd64
            extension: tar.gz
          - runner: macos-15
            plugin_os: darwin
            plugin_arch: arm64
            extension: tar.gz
          - runner: windows-latest
            plugin_os: windows
            plugin_arch: amd64
            extension: zip
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Build Java plugin
        if: runner.os != 'Windows'
        run: ./plugins/java/gradlew -p plugins/java assemble

      - name: Build Java plugin
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\plugins\java\gradlew.bat -p plugins/java assemble

      - name: Upload Java plugin asset
        if: runner.os != 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          asset="bu1ld-java-plugin_${version}_${{ matrix.plugin_os }}_${{ matrix.plugin_arch }}.${{ matrix.extension }}"
          stage="dist/java-plugin-package"
          rm -rf "$stage"
          mkdir -p "$stage"
          cp -R plugins/java/build/plugin/. "$stage/"
          tar -czf "$asset" -C "$stage" .
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$asset" > "$asset.sha256"
          else
            shasum -a 256 "$asset" | awk '{print $1 "  " $2}' > "$asset.sha256"
          fi
          gh release upload "$GITHUB_REF_NAME" "$asset" "$asset.sha256" --clobber

      - name: Upload Java plugin asset
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          $asset = "bu1ld-java-plugin_${version}_${{ matrix.plugin_os }}_${{ matrix.plugin_arch }}.${{ matrix.extension }}"
          $stage = "dist\java-plugin-package"
          if (Test-Path $stage) {
            Remove-Item -Recurse -Force $stage
          }
          New-Item -ItemType Directory -Force $stage | Out-Null
          Copy-Item -Path "plugins\java\build\plugin\*" -Destination $stage -Recurse -Force
          Compress-Archive -Path "$stage\*" -DestinationPath $asset -Force
          $hash = (Get-FileHash $asset -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $asset" | Set-Content "$asset.sha256"
          gh release upload $env:GITHUB_REF_NAME $asset "$asset.sha256" --clobber

  typescript-plugin-assets:
    needs: goreleaser
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: plugins/typescript/package-lock.json

      - name: Build TypeScript plugin
        run: |
          npm --prefix plugins/typescript ci
          npm --prefix plugins/typescript run build
          npm --prefix plugins/typescript prune --omit=dev
          chmod +x plugins/typescript/dist/main.js

      - name: Upload TypeScript plugin asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          asset="bu1ld-typescript-plugin_${version}.tar.gz"
          stage="dist/typescript-plugin-package"
          rm -rf "$stage"
          mkdir -p "$stage"
          cp plugins/typescript/plugin.toml "$stage/plugin.toml"
          cp plugins/typescript/package.json "$stage/package.json"
          cp plugins/typescript/package-lock.json "$stage/package-lock.json"
          cp -R plugins/typescript/dist "$stage/dist"
          cp -R plugins/typescript/node_modules "$stage/node_modules"
          tar -czf "$asset" -C "$stage" .
          sha256sum "$asset" > "$asset.sha256"
          gh release upload "$GITHUB_REF_NAME" "$asset" "$asset.sha256" --clobber

  verify-container-images:
    needs:
      - goreleaser
      - java-plugin-container
      - typescript-plugin-container
    runs-on: ubuntu-latest

    steps:
      - name: Compute container metadata
        id: container
        shell: bash
        run: |
          echo "namespace=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and smoke test container images
        shell: bash
        run: |
          set -euo pipefail
          namespace="${{ steps.container.outputs.namespace }}"
          version="${{ steps.container.outputs.version }}"

          docker pull "$namespace/bu1ld:$version"
          docker run --rm "$namespace/bu1ld:$version" --help

          docker pull "$namespace/bu1ld-go-plugin:$version"
          docker run --rm "$namespace/bu1ld-go-plugin:$version" --help

          docker pull "$namespace/bu1ld-java-plugin:$version"
          docker run --rm --entrypoint /bin/sh "$namespace/bu1ld-java-plugin:$version" -c 'test -x /opt/bu1ld-java-plugin/bin/bu1ld-java-plugin'

          docker pull "$namespace/bu1ld-typescript-plugin:$version"
          docker run --rm --entrypoint /bin/sh "$namespace/bu1ld-typescript-plugin:$version" -c 'test -f /opt/bu1ld-typescript-plugin/dist/main.js'

  verify-release-assets:
    needs:
      - goreleaser
      - java-plugin-assets
      - typescript-plugin-assets
      - verify-container-images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist/release
          gh release download "$GITHUB_REF_NAME" --dir dist/release --clobber

      - name: Verify release checksums
        run: bash scripts/verify-release-assets.sh dist/release

      - name: Run release install E2E
        run: bash scripts/release-e2e.sh dist/release
