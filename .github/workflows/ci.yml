name: ci

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  go:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15
          - windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Test Go
        run: go test ./...

      - name: Test Go plugin
        run: go test ./plugins/go/...

  java-plugin:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15
          - windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Check Java plugin
        if: runner.os != 'Windows'
        run: ./plugins/java/gradlew -p plugins/java check

      - name: Check Java plugin
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\plugins\java\gradlew.bat -p plugins/java check
