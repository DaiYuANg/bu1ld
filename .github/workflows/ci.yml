name: ci

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  go:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15
          - windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Test Go
        run: go test ./...

      - name: Test Go plugin
        run: go test ./plugins/go/...

  java-plugin:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15
          - windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Check Java plugin
        if: runner.os != 'Windows'
        run: ./plugins/java/gradlew -p plugins/java check

      - name: Check Java plugin
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\plugins\java\gradlew.bat -p plugins/java check

  typescript-plugin:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15
          - windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: plugins/typescript/package-lock.json

      - name: Install TypeScript plugin dependencies
        run: npm --prefix plugins/typescript ci

      - name: Check TypeScript plugin
        run: npm --prefix plugins/typescript test

  remote-cache-e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Run remote cache E2E
        run: bash scripts/remote-cache-e2e.sh

  container-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build bu1ld image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packaging/container/bu1ld.Dockerfile
          push: false
          tags: bu1ld:ci
          build-args: |
            VERSION=ci
            COMMIT=${{ github.sha }}

      - name: Build Go plugin image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packaging/container/bu1ld-go-plugin.Dockerfile
          push: false
          tags: bu1ld-go-plugin:ci
          build-args: |
            VERSION=ci
            COMMIT=${{ github.sha }}

      - name: Build Java plugin image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packaging/container/bu1ld-java-plugin.Dockerfile
          push: false
          tags: bu1ld-java-plugin:ci

      - name: Build TypeScript plugin image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packaging/container/bu1ld-typescript-plugin.Dockerfile
          push: false
          tags: bu1ld-typescript-plugin:ci
